name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create ZIP archive
        run: |
          zip -r "HLPatcher-${{ github.ref_name }}.zip" . -x "*.git*" ".github*" ".idea*" "*/*.DS_Store*" ".DS_Store" "HLPatcher-*.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: HLPatcher-${{ github.ref_name }}.zip
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
